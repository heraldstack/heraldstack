<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes mascot-pulse {
        0%   { filter: drop-shadow(0 0 4px #58a6ff); }
        40%  { filter: drop-shadow(0 0 16px #58a6ff); }
        100% { filter: drop-shadow(0 0 4px #58a6ff); }
      }

      @keyframes signal-arc-ripple {
        0%   { stroke-dashoffset: 0; opacity: 0; }
        50%  { opacity: 0.7; }
        100% { stroke-dashoffset: 628; opacity: 0; }
      }

      @keyframes orbit-inner {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes orbit-outer {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }

      @keyframes node-glow-blue {
        0%, 100% { filter: drop-shadow(0 0 2px #58a6ff); fill-opacity: 0.6; }
        33%       { filter: drop-shadow(0 0 10px #58a6ff); fill-opacity: 0.95; }
      }

      @keyframes node-glow-green {
        0%, 100% { filter: drop-shadow(0 0 2px #7ee787); fill-opacity: 0.6; }
        50%       { filter: drop-shadow(0 0 10px #7ee787); fill-opacity: 0.95; }
      }

      @keyframes node-glow-purple {
        0%, 100% { filter: drop-shadow(0 0 2px #d2a8ff); fill-opacity: 0.6; }
        66%       { filter: drop-shadow(0 0 10px #d2a8ff); fill-opacity: 0.95; }
      }

      .mascot        { animation: mascot-pulse 2.4s ease-in-out infinite; }
      .orbit-inner   { animation: orbit-inner 9s linear infinite; transform-origin: 600px 160px; }
      .orbit-outer   { animation: orbit-outer 6s linear infinite; transform-origin: 600px 160px; }
      .arc-1         { animation: signal-arc-ripple 3s ease-out infinite; }
      .arc-2         { animation: signal-arc-ripple 3s ease-out infinite; animation-delay: 1s; }
      .arc-3         { animation: signal-arc-ripple 3s ease-out infinite; animation-delay: 2s; }

      /* inner ring nodes */
      .n-herald      { animation: node-glow-blue   5s ease-in-out infinite; }
      .n-stratia     { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 0.6s; }
      .n-ellow       { animation: node-glow-blue   5s ease-in-out infinite; animation-delay: 1.2s; }
      .n-orin        { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 1.8s; }
      .n-kerouac     { animation: node-glow-blue   5s ease-in-out infinite; animation-delay: 2.4s; }
      .n-voss        { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 3.0s; }
      .n-tarn        { animation: node-glow-blue   5s ease-in-out infinite; animation-delay: 3.6s; }
      .n-ralph       { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 4.2s; }

      /* outer ring nodes */
      .n-kade        { animation: node-glow-purple 5s ease-in-out infinite; }
      .n-scribe      { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 0.6s; }
      .n-myrren      { animation: node-glow-purple 5s ease-in-out infinite; animation-delay: 1.2s; }
      .n-liora       { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 1.8s; }
      .n-solan       { animation: node-glow-purple 5s ease-in-out infinite; animation-delay: 2.4s; }
      .n-hcom        { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 3.0s; }
      .n-arion       { animation: node-glow-purple 5s ease-in-out infinite; animation-delay: 3.6s; }
      .n-nyxen       { animation: node-glow-green  5s ease-in-out infinite; animation-delay: 4.2s; }
    </style>

    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color: #0d1117; stop-opacity: 1;" />
      <stop offset="100%" style="stop-color: #1a2c4a; stop-opacity: 0.2;" />
    </linearGradient>

    <radialGradient id="aurora-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color: #7ee787; stop-opacity: 0.15;">
        <animate attributeName="stop-color" values="#7ee787; #58a6ff; #d2a8ff; #7ee787" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color: #58a6ff; stop-opacity: 0;" />
    </radialGradient>

    <!-- fox ear accent gradient -->
    <linearGradient id="ear-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color: #e8834a; stop-opacity: 0.95;" />
      <stop offset="100%" style="stop-color: #c45f28; stop-opacity: 0.7;" />
    </linearGradient>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark background -->
  <rect width="1200" height="340" fill="#0d1117"/>
  <rect width="1200" height="340" fill="url(#bg-gradient)"/>
  <rect width="1200" height="110" fill="url(#aurora-glow)"/>

  <!-- orbit track rings (faint guide circles, centered at 600,160) -->
  <circle cx="600" cy="160" r="85"  fill="none" stroke="#58a6ff" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.18"/>
  <circle cx="600" cy="160" r="145" fill="none" stroke="#d2a8ff" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.14"/>

  <!-- signal arc ripples from center -->
  <g opacity="0.6">
    <circle cx="600" cy="160" r="45"  fill="none" stroke="#58a6ff" stroke-width="1.5" class="arc-1" stroke-dasharray="141.4" stroke-dashoffset="0"/>
    <circle cx="600" cy="160" r="65"  fill="none" stroke="#7ee787" stroke-width="1"   class="arc-2" stroke-dasharray="408.4" stroke-dashoffset="0" opacity="0.7"/>
    <circle cx="600" cy="160" r="85"  fill="none" stroke="#d2a8ff" stroke-width="0.8" class="arc-3" stroke-dasharray="534"   stroke-dashoffset="0" opacity="0.5"/>
  </g>

  <!-- ============================================================
       FOX-EAR ROBOT MASCOT — center 600,160
       geometric mech face: angular ears, visor, ^.^ smile
       ============================================================ -->
  <g class="mascot" filter="url(#glow-filter)">

    <!-- left ear (fox triangle, orange fill) -->
    <polygon points="567,105 575,128 551,128" fill="url(#ear-grad)" opacity="0.92"/>
    <polygon points="567,110 572,127 559,127" fill="#0d1117" opacity="0.55"/>

    <!-- right ear (fox triangle, orange fill) -->
    <polygon points="633,105 649,128 641,128" fill="url(#ear-grad)" opacity="0.92"/>
    <polygon points="633,110 645,127 637,127" fill="#0d1117" opacity="0.55"/>

    <!-- head plate -->
    <path d="M 574 128 L 566 146 L 568 168 L 580 182 L 620 182 L 632 168 L 634 146 L 626 128 Z"
          fill="#131c2e" stroke="#58a6ff" stroke-width="1.5" opacity="0.95"/>

    <!-- brow panel -->
    <line x1="574" y1="140" x2="626" y2="140" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>

    <!-- left visor eye -->
    <rect x="577" y="144" width="16" height="10" rx="2" fill="#58a6ff" opacity="0.85"/>
    <rect x="580" y="146" width="10" height="6"  rx="1" fill="#0d1117" opacity="0.6"/>
    <circle cx="582" cy="147" r="1.5" fill="#7ee787" opacity="0.9"/>

    <!-- right visor eye -->
    <rect x="607" y="144" width="16" height="10" rx="2" fill="#58a6ff" opacity="0.85"/>
    <rect x="610" y="146" width="10" height="6"  rx="1" fill="#0d1117" opacity="0.6"/>
    <circle cx="612" cy="147" r="1.5" fill="#7ee787" opacity="0.9"/>

    <!-- muzzle plate -->
    <rect x="584" y="160" width="32" height="14" rx="4" fill="#1a2c4a" stroke="#7ee787" stroke-width="1" opacity="0.85"/>

    <!-- ^.^ closed-smile expression -->
    <path d="M 588 167 Q 591 171 594 167" fill="none" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 606 167 Q 609 171 612 167" fill="none" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round"/>

    <!-- chin/neck connector -->
    <rect x="592" y="182" width="16" height="8" rx="2" fill="#1a2c4a" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>

    <!-- side panel details — left -->
    <rect x="566" y="148" width="8" height="18" rx="1" fill="#1a2c4a" stroke="#58a6ff" stroke-width="0.8" opacity="0.6"/>
    <circle cx="570" cy="157" r="2" fill="#d2a8ff" opacity="0.7"/>

    <!-- side panel details — right -->
    <rect x="626" y="148" width="8" height="18" rx="1" fill="#1a2c4a" stroke="#58a6ff" stroke-width="0.8" opacity="0.6"/>
    <circle cx="630" cy="157" r="2" fill="#d2a8ff" opacity="0.7"/>

    <!-- antenna -->
    <line x1="600" y1="128" x2="600" y2="113" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="600" cy="111" r="2.5" fill="#7ee787" opacity="0.9"/>
  </g>

  <!-- ============================================================
       INNER ORBIT RING — 8 agents, r=85, center 600,160
       angles offset 22.5deg; positions computed as:
         x = 600 + 85*sin(a), y = 160 - 85*cos(a)
       22.5° → (633, 81)   67.5° → (679,128)  112.5° → (679,192)
       157.5° → (633,239)  202.5° → (567,239)  247.5° → (521,192)
       292.5° → (521,128)  337.5° → (567, 81)
       ============================================================ -->
  <g class="orbit-inner">
    <g class="n-herald">
      <circle cx="633" cy="81"  r="5" fill="#58a6ff"/>
      <circle cx="633" cy="81"  r="8" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
      <text x="633" y="66" font-family="monospace" font-size="9" text-anchor="middle" fill="#58a6ff" opacity="0.85">harald</text>
    </g>
    <g class="n-stratia">
      <circle cx="679" cy="128" r="5" fill="#7ee787"/>
      <circle cx="679" cy="128" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="700" y="131" font-family="monospace" font-size="9" text-anchor="start" fill="#7ee787" opacity="0.85">stratia</text>
    </g>
    <g class="n-ellow">
      <circle cx="679" cy="192" r="5" fill="#58a6ff"/>
      <circle cx="679" cy="192" r="8" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
      <text x="700" y="195" font-family="monospace" font-size="9" text-anchor="start" fill="#58a6ff" opacity="0.85">ellow</text>
    </g>
    <g class="n-orin">
      <circle cx="633" cy="239" r="5" fill="#7ee787"/>
      <circle cx="633" cy="239" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="633" y="255" font-family="monospace" font-size="9" text-anchor="middle" fill="#7ee787" opacity="0.85">orin</text>
    </g>
    <g class="n-kerouac">
      <circle cx="567" cy="239" r="5" fill="#58a6ff"/>
      <circle cx="567" cy="239" r="8" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
      <text x="567" y="255" font-family="monospace" font-size="9" text-anchor="middle" fill="#58a6ff" opacity="0.85">kerouac</text>
    </g>
    <g class="n-voss">
      <circle cx="521" cy="192" r="5" fill="#7ee787"/>
      <circle cx="521" cy="192" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="499" y="195" font-family="monospace" font-size="9" text-anchor="end" fill="#7ee787" opacity="0.85">voss</text>
    </g>
    <g class="n-tarn">
      <circle cx="521" cy="128" r="5" fill="#58a6ff"/>
      <circle cx="521" cy="128" r="8" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
      <text x="499" y="131" font-family="monospace" font-size="9" text-anchor="end" fill="#58a6ff" opacity="0.85">tarn</text>
    </g>
    <g class="n-ralph">
      <circle cx="567" cy="81"  r="5" fill="#7ee787"/>
      <circle cx="567" cy="81"  r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="567" y="66" font-family="monospace" font-size="9" text-anchor="middle" fill="#7ee787" opacity="0.85">ralph-wiggum</text>
    </g>
  </g>

  <!-- ============================================================
       OUTER ORBIT RING — 8 agents, r=145, center 600,160
       angles offset 22.5deg (interleave with inner ring):
         x = 600 + 145*sin(a), y = 160 - 145*cos(a)
       22.5° → (656, 26)   67.5° → (734,105)  112.5° → (734,215)
       157.5° → (656,294)  202.5° → (545,294)  247.5° → (466,215)
       292.5° → (466,105)  337.5° → (545, 26)
       ============================================================ -->
  <g class="orbit-outer">
    <g class="n-kade">
      <circle cx="656" cy="26"  r="5" fill="#d2a8ff"/>
      <circle cx="656" cy="26"  r="8" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.4"/>
      <text x="656" y="42" font-family="monospace" font-size="9" text-anchor="middle" fill="#d2a8ff" opacity="0.85">kade-vox</text>
    </g>
    <g class="n-scribe">
      <circle cx="734" cy="105" r="5" fill="#7ee787"/>
      <circle cx="734" cy="105" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="756" y="108" font-family="monospace" font-size="9" text-anchor="start" fill="#7ee787" opacity="0.85">scribe</text>
    </g>
    <g class="n-myrren">
      <circle cx="734" cy="215" r="5" fill="#d2a8ff"/>
      <circle cx="734" cy="215" r="8" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.4"/>
      <text x="756" y="218" font-family="monospace" font-size="9" text-anchor="start" fill="#d2a8ff" opacity="0.85">myrren</text>
    </g>
    <g class="n-liora">
      <circle cx="656" cy="294" r="5" fill="#7ee787"/>
      <circle cx="656" cy="294" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="656" y="310" font-family="monospace" font-size="9" text-anchor="middle" fill="#7ee787" opacity="0.85">liora</text>
    </g>
    <g class="n-solan">
      <circle cx="545" cy="294" r="5" fill="#d2a8ff"/>
      <circle cx="545" cy="294" r="8" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.4"/>
      <text x="545" y="310" font-family="monospace" font-size="9" text-anchor="middle" fill="#d2a8ff" opacity="0.85">solan</text>
    </g>
    <g class="n-hcom">
      <circle cx="466" cy="215" r="5" fill="#7ee787"/>
      <circle cx="466" cy="215" r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="444" y="218" font-family="monospace" font-size="9" text-anchor="end" fill="#7ee787" opacity="0.85">hcom</text>
    </g>
    <g class="n-arion">
      <circle cx="466" cy="105" r="5" fill="#d2a8ff"/>
      <circle cx="466" cy="105" r="8" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.4"/>
      <text x="444" y="108" font-family="monospace" font-size="9" text-anchor="end" fill="#d2a8ff" opacity="0.85">arion</text>
    </g>
    <g class="n-nyxen">
      <circle cx="545" cy="26"  r="5" fill="#7ee787"/>
      <circle cx="545" cy="26"  r="8" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.4"/>
      <text x="545" y="42" font-family="monospace" font-size="9" text-anchor="middle" fill="#7ee787" opacity="0.85">nyxen</text>
    </g>
  </g>

  <!-- heraldstack wordmark -->
  <text x="600" y="332" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" fill="#58a6ff" opacity="0.95" letter-spacing="2">heraldstack</text>
</svg>
