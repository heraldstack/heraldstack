<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes horn-pulse {
        0% { filter: drop-shadow(0 0 4px #58a6ff); }
        40% { filter: drop-shadow(0 0 14px #58a6ff); }
        100% { filter: drop-shadow(0 0 4px #58a6ff); }
      }

      @keyframes signal-arc-ripple {
        0% { stroke-dashoffset: 0; opacity: 0; }
        50% { opacity: 0.8; }
        100% { stroke-dashoffset: 628; opacity: 0; }
      }

      @keyframes orbit-rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes node-glow-1 {
        0%, 100% { filter: drop-shadow(0 0 2px #58a6ff); fill-opacity: 0.6; }
        25% { filter: drop-shadow(0 0 10px #58a6ff); fill-opacity: 0.95; }
      }

      @keyframes node-glow-2 {
        0%, 100% { filter: drop-shadow(0 0 2px #7ee787); fill-opacity: 0.6; }
        50% { filter: drop-shadow(0 0 10px #7ee787); fill-opacity: 0.95; }
      }

      @keyframes node-glow-3 {
        0%, 100% { filter: drop-shadow(0 0 2px #d2a8ff); fill-opacity: 0.6; }
        75% { filter: drop-shadow(0 0 10px #d2a8ff); fill-opacity: 0.95; }
      }

      @keyframes aurora-shimmer {
        0% { stop-color: #58a6ff; stop-opacity: 0.1; }
        50% { stop-color: #7ee787; stop-opacity: 0.3; }
        100% { stop-color: #58a6ff; stop-opacity: 0.1; }
      }

      @keyframes core-heartbeat {
        0%, 100% { r: 8; filter: drop-shadow(0 0 6px #58a6ff); }
        50% { r: 12; filter: drop-shadow(0 0 16px #58a6ff); }
      }

      .horn { animation: horn-pulse 2.2s ease-in-out infinite; }
      .orbit { animation: orbit-rotation 6s linear infinite; transform-origin: 400px 90px; }
      .arc-1 { animation: signal-arc-ripple 3s ease-out infinite; }
      .arc-2 { animation: signal-arc-ripple 3s ease-out infinite; animation-delay: 0.8s; }
      .arc-3 { animation: signal-arc-ripple 3s ease-out infinite; animation-delay: 1.6s; }
      .core { animation: core-heartbeat 1.8s ease-in-out infinite; }
      .node-shannon { animation: node-glow-1 4s ease-in-out infinite; }
      .node-haunting { animation: node-glow-2 4s ease-in-out infinite; animation-delay: 1s; }
      .node-gander { animation: node-glow-3 4s ease-in-out infinite; animation-delay: 2s; }
      .node-ibeji { animation: node-glow-1 4s ease-in-out infinite; animation-delay: 1.5s; }
      .node-squad { animation: node-glow-2 4s ease-in-out infinite; animation-delay: 2.5s; }
    </style>

    <defs>
      <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color: #0d1117; stop-opacity: 1;" />
        <stop offset="100%" style="stop-color: #1a2c4a; stop-opacity: 0.2;" />
      </linearGradient>

      <radialGradient id="aurora-glow" cx="50%" cy="30%" r="60%">
        <stop offset="0%" style="stop-color: #7ee787; stop-opacity: 0.2;">
          <animate attributeName="stop-color" values="#7ee787; #58a6ff; #d2a8ff; #7ee787" dur="8s" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" style="stop-color: #58a6ff; stop-opacity: 0;" />
      </radialGradient>

      <filter id="glow-filter">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </defs>

  <!-- dark background -->
  <rect width="800" height="200" fill="#0d1117"/>
  <rect width="800" height="200" fill="url(#bg-gradient)"/>

  <!-- aurora borealis subtle shimmer across top -->
  <rect width="800" height="80" fill="url(#aurora-glow)"/>

  <!-- central herald horn / trumpet -->
  <g class="horn" filter="url(#glow-filter)">
    <!-- bell -->
    <path d="M 380 110 Q 370 95 375 75 Q 380 60 400 55 Q 420 60 425 75 Q 430 95 420 110" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.95"/>

    <!-- mouthpiece -->
    <line x1="398" y1="55" x2="398" y2="40" stroke="#58a6ff" stroke-width="2" opacity="0.9"/>
    <circle cx="398" cy="38" r="1.5" fill="#7ee787" opacity="0.9"/>

    <!-- support rings -->
    <ellipse cx="400" cy="85" rx="28" ry="12" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="400" cy="105" rx="25" ry="10" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>

    <!-- central core glow -->
    <circle cx="400" cy="85" r="5" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- signal arcs radiating outward -->
  <g opacity="0.7">
    <circle cx="400" cy="90" r="45" fill="none" stroke="#58a6ff" stroke-width="1.5" class="arc-1" stroke-dasharray="141.4" stroke-dashoffset="0" opacity="0.8"/>
    <circle cx="400" cy="90" r="65" fill="none" stroke="#7ee787" stroke-width="1" class="arc-2" stroke-dasharray="408.4" stroke-dashoffset="0" opacity="0.5"/>
    <circle cx="400" cy="90" r="80" fill="none" stroke="#d2a8ff" stroke-width="0.8" class="arc-3" stroke-dasharray="502.7" stroke-dashoffset="0" opacity="0.4"/>
  </g>

  <!-- orbiting nodes (5 collectives) -->
  <g class="orbit">
    <!-- shannon — top -->
    <g class="node-shannon">
      <circle cx="400" cy="25" r="5" fill="#58a6ff"/>
      <circle cx="400" cy="25" r="7" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
      <text x="400" y="48" font-family="monospace" font-size="10" text-anchor="middle" fill="#58a6ff" opacity="0.8">shannon</text>
    </g>

    <!-- haunting — top-right -->
    <g class="node-haunting">
      <circle cx="465" cy="45" r="5" fill="#7ee787"/>
      <circle cx="465" cy="45" r="7" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.5"/>
      <text x="490" y="50" font-family="monospace" font-size="10" text-anchor="middle" fill="#7ee787" opacity="0.8">haunting</text>
    </g>

    <!-- gander — bottom-right -->
    <g class="node-gander">
      <circle cx="445" cy="155" r="5" fill="#d2a8ff"/>
      <circle cx="445" cy="155" r="7" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.5"/>
      <text x="480" y="165" font-family="monospace" font-size="10" text-anchor="middle" fill="#d2a8ff" opacity="0.8">gander</text>
    </g>

    <!-- ibeji — bottom-left -->
    <g class="node-ibeji">
      <circle cx="335" cy="155" r="5" fill="#58a6ff"/>
      <circle cx="335" cy="155" r="7" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
      <text x="300" y="165" font-family="monospace" font-size="10" text-anchor="middle" fill="#58a6ff" opacity="0.8">ibeji</text>
    </g>

    <!-- squad — top-left -->
    <g class="node-squad">
      <circle cx="355" cy="45" r="5" fill="#7ee787"/>
      <circle cx="355" cy="45" r="7" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.5"/>
      <text x="320" y="50" font-family="monospace" font-size="10" text-anchor="middle" fill="#7ee787" opacity="0.8">squad</text>
    </g>
  </g>

  <!-- connection lines from horn to nodes (subtle, inside orbit ring) -->
  <g opacity="0.3" stroke="#58a6ff" stroke-width="0.8" stroke-dasharray="2,3">
    <line x1="400" y1="60" x2="400" y2="25" />
    <line x1="400" y1="60" x2="465" y2="45" />
    <line x1="400" y1="60" x2="445" y2="155" />
    <line x1="400" y1="60" x2="335" y2="155" />
    <line x1="400" y1="60" x2="355" y2="45" />
  </g>

  <!-- text: heraldstack -->
  <text x="400" y="185" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#58a6ff" opacity="0.95" letter-spacing="1">
    heraldstack
  </text>
</svg>
