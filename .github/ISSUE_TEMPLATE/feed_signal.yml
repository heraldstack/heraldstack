name: feed signal promotion
about: capture a feed/changelog/research signal and promote to actionable work
labels:
  - signal/feed
  - state/captured
body:
  - type: input
    id: source_url
    attributes:
      label: source url
      description: canonical source link for this signal
    validations:
      required: true
  - type: dropdown
    id: signal_type
    attributes:
      label: signal type
      options:
        - feed
        - changelog
        - research
    validations:
      required: true
  - type: textarea
    id: observation
    attributes:
      label: observation
      description: what changed and why it matters
    validations:
      required: true
  - type: textarea
    id: decision_impact
    attributes:
      label: decision impact
      description: product, delivery, risk, or tooling impact
    validations:
      required: true
  - type: textarea
    id: proposed_action
    attributes:
      label: proposed action
      description: candidate issue or sprint action
    validations:
      required: true
  - type: input
    id: confidence
    attributes:
      label: confidence (0-100)
      placeholder: 75
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: p0 highest impact, p3 lowest. schema-required field.
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: dropdown
    id: promotion_decision
    attributes:
      label: promotion decision
      options:
        - promote
        - hold
        - archive
    validations:
      required: true
  - type: checkboxes
    id: attribution
    attributes:
      label: joint attribution
      description: both identities are required for heraldstack work
      options:
        - label: attribute to bryanchasko
          required: true
        - label: attribute to heraldstack
          required: true

  - type: markdown
    attributes:
      value: "attach logs/screenshots/artifacts when available."
  - type: input
    id: evidence_files
    attributes:
      label: evidence files
      description: links or file references for supporting evidence
      placeholder: logs, screenshots, benchmark output
    validations:
      required: false
  - type: dropdown
    id: owner_entity
    attributes:
      label: owner entity
      options:
        - harald
        - stratia
        - myrren
        - liora
        - kade vox
        - solan
        - ellow
        - orin
    validations:
      required: true
